name: 新機能の要望
description: 新しい機能やアイデアを提案する
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能の提案ありがとうございます。以下の項目をできるだけ詳しく記入してください。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: この機能がないことで困っていることは何ですか？
      placeholder: 例）保存したレシピを料理のジャンルごとに分類できないため、目的のレシピを探しにくい
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 希望する機能
      description: どのような機能があると嬉しいですか？
      placeholder: 例）レシピにタグを付けて、タグで絞り込み検索できる機能
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に考えられる解決方法があれば教えてください。
      placeholder: 例）カテゴリ機能でもよいが、1つのレシピに複数のジャンルを付けられるタグの方が柔軟
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 参考イメージ
      description: 参考になるスクリーンショットやデザインイメージがあれば添付してください。
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: その他、参考になりそうな情報があれば記入してください。
    validations:
      required: false
